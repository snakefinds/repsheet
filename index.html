<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,700;0,800;1,700;1,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #ff3d8c;
    --accent2: #ff6b4a;
    --bg: #050810;
    --surface: #0d111c;
    --surface2: #141a2a;
    --border: rgba(255, 255, 255, 0.08);
    --text: #f5f5f7;
    --muted: #9ca3af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; color-scheme: dark; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .bg-blobs {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 50% at 10% 20%, rgba(255, 61, 140, 0.12), transparent),
      radial-gradient(ellipse 60% 40% at 90% 60%, rgba(255, 107, 74, 0.08), transparent);
  }
  .bg-shape {
    position: fixed; border-radius: 24px; opacity: 0.15;
    border: 1px solid rgba(255, 61, 140, 0.4);
    transform: rotate(-12deg);
    pointer-events: none; z-index: 0;
  }
  .bg-shape:nth-child(1) { width: 120px; height: 120px; top: 15%; left: 8%; filter: blur(1px); }
  .bg-shape:nth-child(2) { width: 80px; height: 80px; top: 55%; left: 3%; opacity: 0.1; }
  .bg-shape:nth-child(3) { width: 100px; height: 100px; bottom: 20%; right: 12%; transform: rotate(8deg); }

  .side-brand {
    position: fixed; right: 0; top: 50%; transform: translateY(-50%) rotate(-90deg);
    font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 11px;
    letter-spacing: 0.5em; color: rgba(255, 61, 140, 0.35); z-index: 1;
    white-space: nowrap; pointer-events: none;
  }
  @media (max-width: 1100px) { .side-brand { display: none; } }

  header.land-header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px clamp(16px, 4vw, 40px);
    max-width: 1320px; margin: 0 auto;
  }
  .land-logo {
    font-family: 'Montserrat', sans-serif; font-weight: 800; font-style: italic;
    font-size: clamp(18px, 2.5vw, 24px); color: var(--accent);
    text-decoration: none; letter-spacing: -0.02em;
  }
  .nav-skew-wrap {
    transform: skewX(-8deg);
    background: linear-gradient(135deg, var(--accent) 0%, #ff6b9d 100%);
    padding: 10px 28px; border-radius: 4px;
    box-shadow: 0 8px 32px rgba(255, 61, 140, 0.35);
  }
  .nav-skew-inner {
    transform: skewX(8deg);
    display: flex; gap: clamp(8px, 1.5vw, 22px); flex-wrap: wrap; align-items: center; justify-content: center;
  }
  .nav-skew-inner a {
    color: #0a0a0a; font-weight: 700; font-size: clamp(9px, 1.1vw, 11px);
    text-decoration: none; text-transform: uppercase; letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .nav-skew-inner a:hover { opacity: 0.75; }
  .nav-skew-inner a.active { text-decoration: underline; text-underline-offset: 3px; }

  .land-burger {
    display: none; width: 48px; height: 48px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    font-size: 20px; cursor: pointer;
  }
  .land-drawer {
    display: none; position: fixed; inset: 0; top: 0; z-index: 100;
    background: rgba(5, 8, 16, 0.96); padding: 88px 24px 24px; flex-direction: column; gap: 12px;
  }
  .land-drawer.open { display: flex; }
  .land-drawer a {
    padding: 16px; border-radius: 12px; border: 1px solid var(--border);
    color: var(--text); text-decoration: none; font-weight: 600;
  }

  @media (max-width: 1024px) {
    .nav-skew-wrap { display: none; }
    .land-burger { display: flex; align-items: center; justify-content: center; }
  }

  .land-hero {
    position: relative; z-index: 5;
    max-width: 1320px; margin: 0 auto;
    padding: clamp(32px, 6vw, 80px) clamp(16px, 4vw, 40px) 80px;
    display: grid; grid-template-columns: 1fr; gap: 40px;
    align-items: center;
  }
  @media (min-width: 960px) {
    .land-hero { grid-template-columns: 1.1fr 0.9fr; }
  }
  .land-hero-copy { max-width: 640px; }
  .land-hero-accent {
    font-family: 'Montserrat', sans-serif; font-weight: 800;
    font-size: clamp(40px, 7vw, 72px); line-height: 1.05; color: var(--accent);
    margin-bottom: 4px;
  }
  .land-hero-rest {
    font-family: 'Montserrat', sans-serif; font-weight: 700;
    font-size: clamp(28px, 5vw, 52px); line-height: 1.1; color: #fff;
    margin-bottom: 24px;
  }
  .land-hero-sub {
    color: var(--muted); font-size: clamp(14px, 1.8vw, 17px); line-height: 1.7; margin-bottom: 32px;
  }
  .land-cta-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; margin-bottom: 28px; }
  .btn-pink {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 14px 28px; border-radius: 999px; border: none; cursor: pointer;
    font-family: inherit; font-weight: 700; font-size: 15px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #0a0a0a; text-decoration: none;
    box-shadow: 0 8px 28px rgba(255, 61, 140, 0.35);
  }
  .btn-pink:hover { filter: brightness(1.08); }
  .btn-white {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 14px 28px; border-radius: 999px;
    font-family: inherit; font-weight: 700; font-size: 15px;
    background: #fff; color: #0a0a0a; text-decoration: none; border: none; cursor: pointer;
  }
  .btn-white:hover { opacity: 0.92; }
  .agent-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .agent-row span { font-size: 12px; color: var(--muted); margin-right: 6px; }
  .agent-icon {
    width: 40px; height: 40px; border-radius: 50%; background: var(--surface2);
    border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .land-hero-visual {
    position: relative; min-height: 200px;
    border-radius: 24px; border: 1px solid var(--border);
    background: linear-gradient(160deg, var(--surface2) 0%, var(--surface) 100%);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
  }
  .land-hero-visual-inner {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: clamp(48px, 10vw, 100px); opacity: 0.25;
  }

  footer.land-footer {
    position: relative; z-index: 5; text-align: center; padding: 32px 16px 48px;
    color: var(--muted); font-size: 13px; border-top: 1px solid var(--border);
  }
</style>
</head>
<body>
<div class="bg-blobs"></div>
<div class="bg-shape"></div><div class="bg-shape"></div><div class="bg-shape"></div>
<div class="side-brand" id="sideBrandEl">SNAKEFINDS</div>

<header class="land-header">
  <a class="land-logo" href="index.html" id="landLogoText">SNAKEFINDS</a>
  <div class="nav-skew-wrap" aria-label="Main navigation">
    <nav class="nav-skew-inner" id="navSkew"></nav>
  </div>
  <button type="button" class="land-burger" id="landBurger" aria-label="Menu" aria-expanded="false">☰</button>
</header>
<nav class="land-drawer" id="landDrawer" aria-hidden="true"></nav>

<main class="land-hero">
  <div class="land-hero-copy">
    <h1>
      <div class="land-hero-accent" id="landHeroAccent">Discover.</div>
      <div class="land-hero-rest" id="landHeroRest">Quality Replicas Without the Scams</div>
    </h1>
    <p class="land-hero-sub" id="landHeroSub">Curated finds and guides from trusted community sources.</p>
    <div class="land-cta-row">
      <a class="btn-pink" id="landCta1" href="finds.html">Browse</a>
      <a class="btn-white" id="landCta2" href="#">Learn How to Buy</a>
    </div>
    <div class="agent-row" id="agentRow">
      <span>Agents</span>
    </div>
  </div>
  <div class="land-hero-visual">
    <div class="land-hero-visual-inner">✦</div>
  </div>
</main>

<footer class="land-footer" id="landFooter">© 2026 · For educational purposes only.</footer>

<script src="site-shell.js"></script>
<script>
(async function () {
  try {
    const data = await SiteShell.loadData();
    const t = data.theme || {};
    SiteShell.applyTheme(t);
    if (t.accent) {
      document.documentElement.style.setProperty('--accent', t.accent);
      document.documentElement.style.setProperty('--accent2', t.accent2 || t.accent);
    }
    if (t.bg) document.documentElement.style.setProperty('--bg', t.bg);
    if (t.surface) {
      document.documentElement.style.setProperty('--surface', t.surface);
      document.documentElement.style.setProperty('--surface2', t.surface);
    }

    const L = data.landing || {};
    const site = t.siteName || 'SNAKEFINDS';
    document.getElementById('landLogoText').textContent = L.logoText || (site.toUpperCase() + (L.logoSuffix || ''));
    document.getElementById('sideBrandEl').textContent = (L.sideBrand || site).toUpperCase().replace(/\s/g, '');

    if (L.heroAccent != null) document.getElementById('landHeroAccent').textContent = L.heroAccent;
    if (L.heroRest != null) document.getElementById('landHeroRest').textContent = L.heroRest;
    if (L.heroSub != null) document.getElementById('landHeroSub').textContent = L.heroSub;
    if (L.ctaPrimary != null) document.getElementById('landCta1').textContent = L.ctaPrimary;
    if (L.ctaPrimaryHref != null) document.getElementById('landCta1').href = L.ctaPrimaryHref;
    if (L.ctaSecondary != null) document.getElementById('landCta2').textContent = L.ctaSecondary;
    if (L.ctaSecondaryHref != null) document.getElementById('landCta2').href = L.ctaSecondaryHref;
    if (data.pages && data.pages.footer != null) document.getElementById('landFooter').textContent = data.pages.footer;

    const nav = data.nav || [];
    const skew = document.getElementById('navSkew');
    const drawer = document.getElementById('landDrawer');
    const file = (window.location.pathname.split('/').pop() || 'index.html').toLowerCase();
    skew.innerHTML = nav.map((item) => {
      const href = String(item.href || '#');
      const safeH = href.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
      const label = SiteShell.esc(item.label);
      const hFile = href.split('/').pop().toLowerCase() || 'index.html';
      const active = file === hFile ? 'active' : '';
      return `<a href="${safeH}" class="${active}">${label}</a>`;
    }).join('');
    drawer.innerHTML = nav.map((item) => {
      const href = String(item.href || '#');
      const safeH = href.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
      return `<a href="${safeH}">${SiteShell.esc(item.label)}</a>`;
    }).join('');

    const agents = (L.agentIcons || '🐼,🔗,📦,🔥,💎,✨').split(',').map((s) => s.trim()).filter(Boolean);
    const row = document.getElementById('agentRow');
    row.innerHTML = `<span>${SiteShell.esc(L.agentsLabel || 'Agents')}</span>` +
      agents.map((ic) => `<span class="agent-icon">${ic}</span>`).join('');

    const burger = document.getElementById('landBurger');
    burger.addEventListener('click', () => {
      drawer.classList.toggle('open');
      const o = drawer.classList.contains('open');
      burger.setAttribute('aria-expanded', o ? 'true' : 'false');
      drawer.setAttribute('aria-hidden', o ? 'false' : 'true');
    });
    drawer.querySelectorAll('a').forEach((a) => {
      a.addEventListener('click', () => {
        drawer.classList.remove('open');
        burger.setAttribute('aria-expanded', 'false');
        drawer.setAttribute('aria-hidden', 'true');
      });
    });

    document.title = (L.pageTitle || site) + ' — Home';
  } catch (e) {
    console.error(e);
  }
})();
</script>
</body>
</html>
