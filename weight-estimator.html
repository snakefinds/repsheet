<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weight Estimator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #ff3d8c;
    --accent2: #e8487a;
    --bg: #06080f;
    --surface: #101522;
    --surface2: #161d2e;
    --border: rgba(255, 255, 255, 0.08);
    --text: #f0f0f3;
    --muted: #8b92a8;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: dark; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  nav.topnav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 clamp(16px, 3vw, 28px); height: 60px;
    border-bottom: 1px solid var(--border);
    background: rgba(6, 8, 15, 0.9); backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 50;
  }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--accent);
    text-decoration: none; letter-spacing: 2px;
  }
  .nav-mobile-toggle {
    display: none; width: 44px; height: 44px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer;
  }
  .nav-desktop-wrap { flex: 1; display: flex; justify-content: center; min-width: 0; }
  .nav-links-desktop { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
  .nav-link { color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 600; }
  .nav-link:hover, .nav-link.active { color: var(--accent); }
  .nav-drawer {
    display: none; position: fixed; top: 60px; left: 0; right: 0; bottom: 0;
    background: rgba(6, 8, 15, 0.97); z-index: 40; flex-direction: column; padding: 20px; gap: 8px;
    border-top: 1px solid var(--border);
  }
  .nav-drawer.open { display: flex; }
  .nav-drawer .nav-link { padding: 14px; border-radius: 10px; border: 1px solid var(--border); }
  @media (max-width: 900px) {
    .nav-mobile-toggle { display: flex; align-items: center; justify-content: center; }
    .nav-desktop-wrap { display: none; }
  }

  .we-wrap { max-width: 1200px; margin: 0 auto; padding: 28px clamp(16px, 3vw, 28px) 60px; }
  .we-head { text-align: center; margin-bottom: 32px; }
  .we-eyebrow { color: var(--accent); font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .we-title { font-size: clamp(28px, 5vw, 40px); font-weight: 800; margin-bottom: 10px; }
  .we-title .a { color: var(--accent); }
  .we-sub { color: var(--muted); max-width: 520px; margin: 0 auto; line-height: 1.6; font-size: 15px; }

  .we-grid {
    display: grid; grid-template-columns: 1fr; gap: 24px;
  }
  @media (min-width: 960px) {
    .we-grid { grid-template-columns: 1fr 320px; align-items: start; }
  }

  .card-panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 22px;
  }
  .card-panel h2 { font-size: 18px; margin-bottom: 4px; }
  .card-panel .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }

  .cat-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
  }
  @media (min-width: 640px) {
    .cat-grid { grid-template-columns: repeat(4, 1fr); }
  }
  .cat-tile {
    border: 1px solid var(--border); border-radius: 12px; padding: 16px 12px;
    background: var(--surface2); cursor: pointer; text-align: center;
    transition: border-color .2s, transform .15s;
  }
  .cat-tile:hover { border-color: rgba(255, 61, 140, 0.45); transform: translateY(-2px); }
  .cat-icon {
    width: 48px; height: 48px; border-radius: 50%; margin: 0 auto 10px;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
  }
  .cat-label { font-size: 13px; font-weight: 600; }

  .we-tip {
    margin-top: 16px; padding: 12px 14px; border-radius: 10px;
    background: rgba(59, 130, 246, 0.12); border: 1px solid rgba(59, 130, 246, 0.25);
    font-size: 12px; color: var(--muted); display: flex; gap: 10px; align-items: flex-start;
  }

  .pack-opt {
    border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px;
    cursor: pointer; transition: border-color .2s;
  }
  .pack-opt.selected { border-color: var(--accent); background: rgba(255, 61, 140, 0.08); }
  .pack-opt strong { display: block; font-size: 14px; margin-bottom: 4px; }
  .pack-opt .g { color: var(--accent); font-weight: 700; font-size: 13px; }
  .pack-opt .hint { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.4; }

  .sum-row { display: flex; justify-content: space-between; font-size: 14px; margin: 8px 0; color: var(--muted); }
  .sum-total { font-size: 15px; font-weight: 700; color: var(--text); margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .sum-total span { color: var(--accent); font-size: 28px; }

  .unit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
  .unit-box {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; text-align: center;
  }
  .unit-box .val { font-size: 20px; font-weight: 800; color: var(--accent); }
  .unit-box .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .items-panel { margin-top: 24px; }
  .items-panel h2 { font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .empty-we {
    text-align: center; padding: 48px 20px; color: var(--muted); border: 1px dashed var(--border);
    border-radius: var(--radius);
  }
  .empty-we .big { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .line-item {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px;
    background: var(--surface2);
  }
  .line-item .meta { flex: 1; min-width: 0; }
  .line-item .meta b { font-size: 14px; }
  .line-item .meta small { color: var(--muted); font-size: 12px; }
  .qty {
    display: flex; align-items: center; gap: 8px;
  }
  .qty button {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); cursor: pointer; font-size: 18px; line-height: 1;
  }
  .qty span { min-width: 24px; text-align: center; font-weight: 700; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75); z-index: 200;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    max-width: 420px; width: 100%; max-height: 85vh; overflow: auto; padding: 22px;
  }
  .modal-box h3 { margin-bottom: 14px; font-size: 17px; }
  .pick-row {
    display: block; width: 100%; text-align: left; padding: 12px 14px; margin-bottom: 8px;
    border-radius: 10px; border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); cursor: pointer; font-family: inherit; font-size: 14px;
  }
  .pick-row:hover { border-color: var(--accent); }
  .pick-row span { color: var(--muted); font-size: 12px; float: right; }
  .modal-close {
    margin-top: 12px; width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; font-family: inherit;
  }
</style>
</head>
<body>
<nav class="topnav">
  <a class="nav-logo" href="index.html" id="weLogo">SNAKEFINDS</a>
  <button type="button" class="nav-mobile-toggle" aria-label="Menu" id="weNavToggle">☰</button>
  <div class="nav-desktop-wrap">
    <div class="nav-links-desktop" id="weNavDesk"></div>
  </div>
</nav>
<div class="nav-drawer" id="weNavDrawer"></div>

<div class="we-wrap">
  <header class="we-head">
    <div class="we-eyebrow" id="weEyebrow">⚖ Explore</div>
    <h1 class="we-title"><span id="weTitle1">Weight</span> <span class="a" id="weTitle2">Estimator</span></h1>
    <p class="we-sub" id="weSub">Estimate your parcel weight before shipping.</p>
  </header>

  <div class="we-grid">
    <div>
      <div class="card-panel">
        <h2 id="weAddTitle">+ Add Items</h2>
        <p class="sub" id="weAddSub">Select a Category</p>
        <div class="cat-grid" id="catGrid"></div>
        <div class="we-tip" id="weTip"><span>ℹ️</span><span>Weights are approximate.</span></div>
      </div>
      <div class="card-panel items-panel">
        <h2 id="weYourTitle">📦 Your Items (0)</h2>
        <div id="cartMount"></div>
      </div>
    </div>
    <aside class="card-panel">
      <h2 id="wePackTitle" style="margin-bottom:16px">📦 Packaging</h2>
      <div id="packMount"></div>
      <div class="sum-row"><span id="weLblItems">Items:</span><span id="sumItems">0g</span></div>
      <div class="sum-row"><span id="weLblPackW">Packaging Weight:</span><span id="sumPack">0g</span></div>
      <div class="sum-total"><span id="weLblTotal">Total Weight:</span> <span id="sumTotal">0g</span></div>
      <div class="unit-grid">
        <div class="unit-box"><div class="val" id="valKg">0</div><div class="lbl" id="lblKg">Kilograms</div></div>
        <div class="unit-box"><div class="val" id="valLbs">0</div><div class="lbl" id="lblLbs">Pounds</div></div>
      </div>
    </aside>
  </div>
</div>

<div class="modal-overlay" id="pickModal">
  <div class="modal-box">
    <h3 id="pickModalTitle">Pick item</h3>
    <div id="pickModalBody"></div>
    <button type="button" class="modal-close" id="pickModalClose">Close</button>
  </div>
</div>

<script src="site-shell.js"></script>
<script>
(function () {
  let CFG = {};
  let cart = [];
  let packagingId = '';
  let pickCategory = null;
  let uid = 0;

  function gramsItems() {
    return cart.reduce((s, l) => s + l.grams * l.qty, 0);
  }
  function currentPack() {
    return (CFG.packaging || []).find((p) => p.id === packagingId) || { grams: 0, label: '' };
  }
  function totalG() {
    return gramsItems() + (currentPack().grams || 0);
  }
  function render() {
    const itemsG = gramsItems();
    const pack = currentPack();
    const packG = pack.grams || 0;
    const tot = totalG();
    document.getElementById('sumItems').textContent = itemsG + 'g';
    document.getElementById('sumPack').textContent = packG + 'g';
    document.getElementById('sumTotal').textContent = tot + 'g';
    const kg = (tot / 1000).toFixed(2);
    const lbs = (tot / 453.592).toFixed(2);
    document.getElementById('valKg').textContent = kg;
    document.getElementById('valLbs').textContent = lbs;

    const mount = document.getElementById('cartMount');
    const yt = document.getElementById('weYourTitle');
    yt.textContent = '📦 ' + (CFG.yourItemsHeading || 'Your Items') + ' (' + cart.reduce((s, l) => s + l.qty, 0) + ')';
    if (!cart.length) {
      mount.innerHTML = '<div class="empty-we"><div class="big">📦</div><b id="emptyT">' + esc(CFG.emptyTitle || 'No items') + '</b><p id="emptyS" style="margin-top:8px;font-size:14px">' + esc(CFG.emptySub || '') + '</p></div>';
      return;
    }
    mount.innerHTML = cart.map((line) => `
      <div class="line-item" data-uid="${line.uid}">
        <div class="meta"><b>${esc(line.name)}</b><br><small>${esc(line.categoryLabel)} · ${line.grams}g each</small></div>
        <div class="qty">
          <button type="button" aria-label="decrease" data-act="dec" data-uid="${line.uid}">−</button>
          <span>${line.qty}</span>
          <button type="button" aria-label="increase" data-act="inc" data-uid="${line.uid}">+</button>
        </div>
      </div>`).join('');
    mount.querySelectorAll('button[data-act]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const id = +btn.getAttribute('data-uid');
        const line = cart.find((l) => l.uid === id);
        if (!line) return;
        if (btn.getAttribute('data-act') === 'inc') line.qty++;
        else line.qty = Math.max(0, line.qty - 1);
        cart = cart.filter((l) => l.qty > 0);
        render();
      });
    });
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
  }

  function openPick(cat) {
    pickCategory = cat;
    document.getElementById('pickModalTitle').textContent = cat.label;
    const body = document.getElementById('pickModalBody');
    body.innerHTML = '';
    (cat.items || []).forEach((it) => {
      const row = document.createElement('button');
      row.type = 'button';
      row.className = 'pick-row';
      row.innerHTML = esc(it.name) + ' <span>' + it.grams + 'g</span>';
      row.addEventListener('click', () => {
        cart.push({ uid: ++uid, name: it.name, grams: +it.grams || 0, qty: 1, categoryLabel: pickCategory.label });
        document.getElementById('pickModal').classList.remove('open');
        render();
      });
      body.appendChild(row);
    });
    document.getElementById('pickModal').classList.add('open');
  }

  function init(cfg) {
    CFG = cfg;
    packagingId = cfg.defaultPackagingId || (cfg.packaging && cfg.packaging[0] && cfg.packaging[0].id) || '';

    document.getElementById('weEyebrow').textContent = cfg.eyebrow || '⚖ Explore';
    document.getElementById('weTitle1').textContent = cfg.titleLine1 || 'Weight';
    document.getElementById('weTitle2').textContent = cfg.titleLine2 || 'Estimator';
    document.getElementById('weSub').textContent = cfg.subtitle || '';
    document.getElementById('weAddTitle').textContent = cfg.sectionAdd || '+ Add Items';
    document.getElementById('weAddSub').textContent = cfg.sectionAddSub || 'Select a Category';
    document.getElementById('weTip').querySelector('span:last-child').textContent = cfg.tip || '';
    document.getElementById('wePackTitle').textContent = '📦 ' + (cfg.packagingHeading || 'Packaging');
    document.getElementById('weLblItems').textContent = cfg.itemsWeightLabel || 'Items:';
    document.getElementById('weLblPackW').textContent = cfg.packagingWeightLabel || 'Packaging Weight:';
    document.getElementById('weLblTotal').textContent = cfg.totalLabel || 'Total Weight:';
    document.getElementById('lblKg').textContent = cfg.kgLabel || 'Kilograms';
    document.getElementById('lblLbs').textContent = cfg.lbsLabel || 'Pounds';

    const grid = document.getElementById('catGrid');
    grid.innerHTML = (cfg.categories || []).map((c) => {
      const cid = String(c.id || '').replace(/[^a-zA-Z0-9_-]/g, '');
      return `<button type="button" class="cat-tile" data-cat="${cid}">
        <div class="cat-icon" style="background:${esc(c.color || '#333')}22;border:2px solid ${esc(c.color || '#666')}">${c.icon || '📦'}</div>
        <div class="cat-label">${esc(c.label)}</div>
      </button>`;
    }).join('');
    grid.querySelectorAll('.cat-tile').forEach((btn) => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-cat');
        const cat = (cfg.categories || []).find((x) => String(x.id) === id);
        if (cat) openPick(cat);
      });
    });

    const pm = document.getElementById('packMount');
    pm.innerHTML = (cfg.packaging || []).map((p) => {
      const pid = String(p.id || '').replace(/"/g, '');
      return `<div class="pack-opt${p.id === packagingId ? ' selected' : ''}" data-pid="${pid}">
        <strong>${esc(p.label)}</strong> <span class="g">${+p.grams || 0}g</span>
        ${p.hint ? `<div class="hint">${esc(p.hint)}</div>` : ''}
      </div>`;
    }).join('');
    pm.querySelectorAll('.pack-opt').forEach((el) => {
      el.addEventListener('click', () => {
        packagingId = el.getAttribute('data-pid');
        pm.querySelectorAll('.pack-opt').forEach((x) => x.classList.remove('selected'));
        el.classList.add('selected');
        render();
      });
    });

    document.getElementById('pickModalClose').addEventListener('click', () => {
      document.getElementById('pickModal').classList.remove('open');
    });
    document.getElementById('pickModal').addEventListener('click', (e) => {
      if (e.target.id === 'pickModal') document.getElementById('pickModal').classList.remove('open');
    });

    render();
  }

  async function boot() {
    const data = await SiteShell.loadData();
    SiteShell.applyTheme(data.theme || {});
    const t = data.theme || {};
    if (t.siteName) document.getElementById('weLogo').textContent = t.siteName;
    if (t.accent) document.documentElement.style.setProperty('--accent', t.accent);

    const nav = data.nav || [];
    SiteShell.renderNavLinks(document.getElementById('weNavDesk'), nav, 'weight-estimator.html');
    SiteShell.renderNavLinks(document.getElementById('weNavDrawer'), nav, 'weight-estimator.html');
    SiteShell.wireMobileNav('.nav-mobile-toggle', '#weNavDrawer');

    const cfg = data.weightEstimator || {};
    init(cfg);
    document.title = (t.siteName || 'Site') + ' — Weight Estimator';
  }

  boot().catch(console.error);
})();
</script>
</body>
</html>
